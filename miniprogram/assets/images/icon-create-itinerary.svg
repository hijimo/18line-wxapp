<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Calendar body -->
  <rect x="6" y="10" width="28" height="24" rx="4" stroke="#ffffff" stroke-width="2.5" fill="none"/>
  <!-- Calendar top tabs -->
  <line x1="13" y1="6" x2="13" y2="13" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="6" x2="27" y2="13" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Divider line -->
  <line x1="6" y1="17" x2="34" y2="17" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Plus sign -->
  <line x1="20" y1="22" x2="20" y2="32" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="27" x2="25" y2="27" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
